server:
  port: 8081

spring:
  application:
    name: simulation-service
  datasource:
    # Host port 5433 (mapped from container 5432 via docker-compose) — see ADR-0005.
    url: jdbc:postgresql://localhost:5433/astro
    username: astro
    password: astro_dev
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

astro:
  kernel:
    library-path: ${ASTRO_KERNEL_LIB:../../kernel/build/libnbody.dylib}
    openmp-threads: ${OMP_NUM_THREADS:8}
  simulation:
    # 1500 keeps real-kernel O(N²) stepping comfortable at 60 Hz on M-series CPUs
    # (~6-10 ms/step with OpenMP). The mock profile can run higher (3000+) since
    # the rotation integrator is O(N). User can adjust per profile via env vars.
    default-n: ${ASTRO_DEFAULT_N:1500}
    default-seed: 42
    default-dt: 0.005
    default-softening: 0.01
    snapshot-rate-hz: 60
  persistence:
    # Diagnostics persisted every 1/metrics-rate-hz seconds. Set to 5 Hz so
    # a 60-Hz stream produces 5 INSERTs/sec instead of 60. Bump up to 60 for
    # higher resolution, or lower to 1 to minimise DB write load.
    metrics-rate-hz: ${ASTRO_METRICS_RATE_HZ:5}
  cors:
    # Comma-separated. Spring auto-converts to List<String> when injected via @Value.
    allowed-origins: http://localhost:4200,http://localhost:4201

---
# Mock profile: V1 quick-test mode without Postgres / FFM.
# Activate with: --spring.profiles.active=mock
# Used in Sem 1 to verify the WebSocket streaming pipeline before the
# real DB schema and Fortran kernel land.
spring:
  config:
    activate:
      on-profile: mock
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

---
# Dev profile: real Fortran kernel via FFM, but DB autoconfig skipped.
# Activate with: --spring.profiles.active=dev
# Useful between Sem 3 (kernel works) and Sem 4 (persistence lands), or
# whenever you want to run the real physics without spinning up Postgres.
spring:
  config:
    activate:
      on-profile: dev
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
