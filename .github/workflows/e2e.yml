name: e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  end-to-end:
    runs-on: ubuntu-latest
    # No `services: postgres` here on purpose: scripts/dev.sh brings up its
    # own postgres via docker-compose (host :5433). Declaring a workflow
    # service on the same port collides ("port is already allocated") and
    # makes dev.sh abort. Running dev.sh unmodified also makes this job
    # exercise the exact path a user follows for `make dev`.

    steps:
      - uses: actions/checkout@v4

      - name: Install gfortran + HDF5
        run: sudo apt-get update && sudo apt-get install -y gfortran libhdf5-dev

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: maven }

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Build kernel
        run: make -C kernel

      - name: Build services
        working-directory: services
        # `install` (not `package`) so shared-contracts-SNAPSHOT lands in
        # ~/.m2 — dev.sh runs `mvn spring-boot:run` per submodule, which
        # otherwise cannot resolve the inter-module dependency.
        run: mvn -B -DskipTests install

      - name: Build apps
        run: |
          for app in apps/shell-app apps/simulation-mfe; do
            (cd "$app" && npm install && npm run build)
          done

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm install
          npx playwright install --with-deps

      - name: Start stack & run E2E
        env:
          ASTRO_KERNEL_LIB: ${{ github.workspace }}/kernel/build/libnbody.so
        run: |
          ./scripts/dev.sh &
          echo "Waiting for simulation-service (:8081) and shell-app (:4200)..."
          ready=0
          for i in $(seq 1 72); do
            up_api=$(curl -fs http://localhost:8081/actuator/health 2>/dev/null | grep -c '"status":"UP"' || true)
            up_web=$(curl -fs -o /dev/null -w '%{http_code}' http://localhost:4200 2>/dev/null || echo 000)
            echo "  [$i/72] api_up=$up_api web=$up_web"
            if [ "$up_api" = "1" ] && [ "$up_web" = "200" ]; then ready=1; echo "Stack is up."; break; fi
            sleep 5
          done
          if [ "$ready" != "1" ]; then echo "Stack did not become ready within 6 min"; exit 1; fi
          (cd tests/e2e && npx playwright test) || (echo "E2E failed"; exit 1)
