# Pythagorean three-body problem (Burrau, 1913).
# Three masses 3, 4, 5 placed at the vertices of a 3-4-5 right triangle, all at rest.
# Famous chaotic problem: ends with one body ejected and a binary remaining.
name: three_body_pythagorean
description: |
  Burrau's Pythagorean three-body problem. Three masses (3, 4, 5) start at rest
  at the vertices of a 3-4-5 right triangle. The system evolves chaotically;
  after several close encounters, body 3 escapes as a runaway and bodies 4-5
  form a tight binary. A classical sensitivity-to-initial-conditions test.

n_bodies: 3
units: henon

initial_condition:
  type: explicit
  bodies:
    - { x:  1.0, y:  3.0, z: 0.0, vx: 0.0, vy: 0.0, vz: 0.0, mass: 3.0 }
    - { x: -2.0, y: -1.0, z: 0.0, vx: 0.0, vy: 0.0, vz: 0.0, mass: 4.0 }
    - { x:  1.0, y: -1.0, z: 0.0, vx: 0.0, vy: 0.0, vz: 0.0, mass: 5.0 }

simulation:
  integrator: leapfrog
  force_calculator: brute_force_o2
  dt: 0.0001
  softening: 0.001
  n_steps: 700000

validation:
  energy_drift_threshold_pct: 1.0    # close encounters; integrator stressed

display:
  units_for_ui: henon
